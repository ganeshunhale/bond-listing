name: Deploy in local ssh
on: 
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: Deploy via ssh
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{secrets.SSH_HOST}}
          username: finrise
          key: ${{secrets.SSH_KEY}}
          script: |
            cd C:\Users\FINRISE\bond-listing
            git pull
            docker compose up -d --build
